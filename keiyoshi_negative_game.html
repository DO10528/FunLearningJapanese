<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>形容詞 ゲーム (Game)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/keiyoshi_negative_game.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


<header>
    <div style="font-weight: 900; font-size:1.2em;">形容詞ゲーム (Negative Form)</div>
    <div class="header-right">
        <a href="keiyoshi_negative_practice.html" class="back-btn">れんしゅうに戻る</a>
        <div id="auth-status" class="auth-status">ゲスト</div>
    </div>
</header>

<div class="game-container">
    <div class="game-tabs">
        <button class="g-tab active" onclick="switchGame(1)">Game 1: Q&A</button>
        <button class="g-tab" onclick="switchGame(2)">Game 2: 並べ替え</button>
        <button class="g-tab" onclick="switchGame(3)">Game 3: 会話</button>
    </div>

    <div id="game1" class="game-section">
        <h2>Q. 質問に どう答えますか？</h2>
        <div class="sub-tabs">
            <button class="s-tab active" onclick="setG1Type('i')">い-形容詞</button>
            <button class="s-tab" onclick="setG1Type('na')">な-形容詞</button>
        </div>
        <div class="question-box" id="g1-q">（もんだい）</div>
        <div class="choices-grid" id="g1-choices"></div>
        <div class="result-msg" id="g1-result"></div>
        <button class="next-btn" id="g1-next" onclick="nextG1()">つぎへ</button>
    </div>

    <div id="game2" class="game-section hidden">
        <h2>Q. ならべかえて 質問(しつもん)をつくろう</h2>
        <div class="instruction">Englishの意味になるように、ブロックをならべてね。</div>
        <div class="question-box" style="font-size: 1.1em; color:#555; background:#fff; border-color:#667eea;" id="g2-eng">
            (English Sentence)
        </div>
        <div class="puzzle-area" id="g2-dropzone"></div>
        <div class="word-bank" id="g2-bank"></div>
        <div class="result-msg" id="g2-result"></div>
        <div style="text-align:center; margin-top:20px;">
            <button class="next-btn" style="display:inline-block; background:#90a4ae;" onclick="resetG2Puzzle()">リセット</button>
            <button class="next-btn" style="display:inline-block; background:#667eea;" onclick="checkG2()">答え合わせ</button>
        </div>
        <button class="next-btn" id="g2-next" onclick="nextG2()">つぎへ</button>
    </div>

    <div id="game3" class="game-section hidden">
        <h2>Q. 会話にあうカードは どっち？</h2>
        <div class="conversation-box">
            <div class="bubble left" id="g3-q">（しつもん）</div>
            <div class="bubble right" id="g3-a">いいえ、______。</div>
        </div>
        <div class="img-choices" id="g3-choices"></div>
        <div class="result-msg" id="g3-result"></div>
        <button class="next-btn" id="g3-next" onclick="nextG3()">つぎへ</button>
    </div>
</div>

<script type="module" src="js/firebase-config.js"></script>

<script src="js/keiyoshi_negative_game.js"></script>

<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=";
};
</script>

</body>
</html>
