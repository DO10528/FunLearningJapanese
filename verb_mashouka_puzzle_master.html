<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-ましょうか つかいかたパズル</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/verb_mashouka_puzzle_master.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


<header>
    <button class="back-to-practice" onclick="handleHeaderBack()">
        <i class="fa-solid fa-arrow-left"></i> もどる
    </button>
    <h1 style="margin:0; font-size:1.2em; color: white;">V-ましょうか つかいかたパズル</h1>
    <div id="auth-status"></div>
</header>

<div class="game-container">

    <div id="mode-selection">
        <h2 style="color:var(--primary-dark); margin-bottom:30px;">どちらのゲームで あそびますか？</h2>
        <button id="offer-mode-btn" class="mode-btn" onclick="startGame('offer')"><i class="fa-solid fa-hand-holding-heart"></i> おてつだい (Shall I?)</button>
        <button id="invite-mode-btn" class="mode-btn" onclick="startGame('invite')"><i class="fa-solid fa-users"></i> おさそい (Shall we?)</button>
    </div>

    <div id="main-game-area" style="display: none;">
        <div class="score-board">
            <span id="game-mode-display" style="color:#d35400;"></span>
            <span><i class="fa-solid fa-star"></i> スコア: <span id="score">0</span></span>
            <span>第 <span id="q-number">0</span> 問</span>
        </div>

        <div class="main-card">
            
            <p style="font-weight: bold; font-size: 1.1em; color:#e65100;" id="question-header">
                <span id="verb-masu-display"></span>
            </p>

            <div class="scenario-box">
                <p style="font-size: 1.1em; margin: 0;">**Q.** <span id="scenario-text"></span></p>
                <div class="image-container">イラスト</div>
            </div>

            <p style="font-size: 1.1em; color: #555;">ことばを ただしい じゅんばんで くみたててね：</p>
            
            <div id="construction-area"></div>
            <div id="block-choices"></div>
            
            <button id="check-btn" onclick="checkSentence()">かくにん</button>
        </div>

        <div id="result-message"></div>
    </div>
</div>

<script type="module" src="js/firebase-config.js"></script>

<script src="js/verb_mashouka_puzzle_master.js"></script>

<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=";
};
</script>


<script>
// Antigravity Session Cleanup
window.addEventListener('antigravity-session-end', function() {
    if (typeof window.performNavCleanup === 'function') {
        window.performNavCleanup();
    }
});
</script>

<script>
// Antigravity Session Cleanup
window.addEventListener('antigravity-session-end', function() {
    if (typeof window.performNavCleanup === 'function') {
        window.performNavCleanup();
    }
});
</script>
</body>


</html>
