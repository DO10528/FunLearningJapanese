<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ばしょ・道案内サバイバル</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/place_directions.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


<header>
    <div class="header-title"><i class="fa-solid fa-map-location-dot"></i> 道案内サバイバル</div>
    <div class="header-btns">
        <button class="nav-btn" id="btn-back" onclick="goBack()" style="display:none;"><i class="fa-solid fa-arrow-left"></i> 戻る</button>
        <button class="nav-btn" id="btn-home" onclick="location.href='index.html'"><i class="fa-solid fa-house"></i></button>
    </div>
</header>

<div id="main-container">

    <div id="screen-learning" class="screen active">
        <div class="learning-section">
            <h3 class="section-title"><i class="fa-solid fa-building"></i> 場所の単語（20こ）</h3>
            <div class="vocab-grid" id="vocab-grid"></div>
        </div>
        
        <div class="learning-section">
            <h3 class="section-title"><i class="fa-solid fa-comments"></i> 会話の練習</h3>
            <div class="phrase-list">
                <div class="phrase-item" onclick="speakText('すみません、えきはどこですか')">
                    <div>
                        <div class="phrase-text">Q. すみません、〇〇は どこですか？</div>
                        <div class="phrase-sub">Excuse me, where is 〇〇?</div>
                    </div>
                    <i class="fa-solid fa-volume-high play-icon"></i>
                </div>
                <div class="phrase-item" onclick="speakText('ここですよ')">
                    <div>
                        <div class="phrase-text">A. ここ / そこ / あそこ ですよ。</div>
                        <div class="phrase-sub">It is here / there / over there.</div>
                    </div>
                    <i class="fa-solid fa-volume-high play-icon"></i>
                </div>
                <div class="phrase-item" onclick="speakText('ありがとうございます')">
                    <div>
                        <div class="phrase-text">ありがとうございます。</div>
                        <div class="phrase-sub">Thank you.</div>
                    </div>
                    <i class="fa-solid fa-volume-high play-icon"></i>
                </div>
            </div>
        </div>
        <div style="height: 80px;"></div> </div>

    <div id="screen-play" class="screen">
        <div style="text-align: center; margin-bottom: 10px; font-weight: bold; color: #888;">
            クエスト <span id="q-current">1</span> / <span id="q-total">5</span>
        </div>

        <div class="game-card">
            <div class="step-indicator" id="step-badge">STEP 1</div>
            <div class="mission-text" id="mission-text">この場所はどこ？</div>
            
            <img id="game-image" class="target-image" src="" alt="場所">
            
            <div id="game-phrase" class="target-phrase"></div>

            <button id="mic-btn" class="mic-btn active-mic" onclick="toggleSpeech()">
                <i class="fa-solid fa-microphone"></i>
            </button>
            
            <div id="feedback-text" class="feedback-text"></div>
            <div id="user-transcript" class="user-transcript"></div>
        </div>
    </div>

</div>

<button id="start-btn" class="fixed-bottom-btn" onclick="startGame()">
    <i class="fa-solid fa-play"></i> ゲームスタート！
</button>

<script src="js/place_directions.js"></script>

<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=word_other";
};
</script>

</body>
</html>
