<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>部首がったいパズル - FunLearnJP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common_ui.css">
<style>
    body {
        background-color: #f4f7fc;
        font-family: 'Zen Maru Gothic', sans-serif;
        margin: 0;
        padding: 0;
        padding-bottom: 80px;
        -webkit-tap-highlight-color: transparent;
    }
    header {
        background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 15px rgba(155, 89, 182, 0.3);
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .logo, .home-icon {
        color: white;
        text-decoration: none;
        font-size: 1.4em;
        font-weight: 900;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .main-container {
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
        text-align: center;
    }
    
    /* Level Select UI */
    .level-view { display: block; }
    .level-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
    .level-card {
        width: 140px; background: white; border-radius: 15px; padding: 20px 10px;
        text-align: center; cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        transition: transform 0.2s; border-bottom: 5px solid #ddd;
    }
    .level-card:active { transform: translateY(3px); border-bottom-width: 2px; }
    .level-badge {
        display: inline-block; padding: 3px 8px; border-radius: 12px;
        color: white; font-weight: bold; margin-bottom: 8px; font-size: 0.7em;
    }
    .level-title { font-size: 2em; font-weight: 900; line-height: 1; margin-bottom: 5px; color: #444; }
    .level-desc { font-size: 0.75em; color: #888; font-weight: bold; }
    .lv-n5 .level-badge { background-color: #e57373; } .lv-n5 { border-bottom-color: #e57373; }
    .lv-n4 .level-badge { background-color: #d32f2f; } .lv-n4 { border-bottom-color: #d32f2f; }
    .lv-n3 .level-badge { background-color: #f57c00; } .lv-n3 { border-bottom-color: #f57c00; }
    
    .btn-back {
        background: #eee; color: #555; border: none; padding: 10px 20px; border-radius: 20px;
        font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 0 #ccc;
    }
    .btn-back:active { transform: translateY(4px); box-shadow: none; }

    /* Game UI */
    .game-card {
        background: white; border-radius: 20px; padding: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px;
    }
    .status-bar {
        display: flex; justify-content: space-between; font-size: 1.1em;
        font-weight: bold; color: #555; margin-bottom: 15px;
    }
    .reading-box {
        background: #fdf2e9; color: #d35400; padding: 15px; border-radius: 12px;
        font-size: 1.5em; font-weight: 900; margin-bottom: 20px; border: 2px dashed #f39c12;
    }
    .parts-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
        margin-bottom: 20px; justify-content: center;
    }
    .part-btn {
        background: #fff; border: 3px solid #ddd; border-radius: 15px;
        font-size: 2.2em; font-weight: bold; color: #333; padding: 15px 0;
        cursor: pointer; transition: all 0.2s; touch-action: manipulation;
        box-shadow: 0 4px 0 #ddd; user-select: none;
    }
    .part-btn:active { transform: translateY(4px); box-shadow: none; }
    .part-btn.selected {
        border-color: #9b59b6; background: #f4e8fb; color: #8e44ad; box-shadow: 0 4px 0 #9b59b6;
    }
    .part-btn.correct {
        border-color: #2ecc71; background: #eafaf1; color: #27ae60;
        box-shadow: 0 4px 0 #2ecc71; pointer-events: none;
    }
    .part-btn.wrong {
        border-color: #e74c3c; background: #fdedec; color: #c0392b;
        box-shadow: 0 4px 0 #e74c3c; animation: shake 0.4s;
    }
    .combine-area {
        height: 120px; display: flex; justify-content: center; align-items: center;
        font-size: 4em; font-weight: 900; color: #8e44ad; gap: 10px; margin-top: 10px;
    }
    .plus-sign { font-size: 0.5em; color: #ccc; }
    
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
    }
    .merged-kanji {
        animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #2ecc71;
    }
    @keyframes pop {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
</style>
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


    <header>
        <a href="index.html" class="logo"><i class="fa-solid fa-shapes"></i> FunLearnJP</a>
        <a href="index.html" class="home-icon"><i class="fa-solid fa-house"></i></a>
    </header>

    <div class="main-container">
        
        <div id="level-select-view" class="level-view">
            <h2 style="color: #8e44ad; margin-top: 0;"><i class="fa-solid fa-layer-group"></i> 部首がったいパズル</h2>
            <p style="color:#555; font-weight:bold;">レベルをえらんでね</p>
            <div class="level-grid">
                <div class="level-card lv-n5" onclick="startLevel('n5')">
                    <span class="level-badge">BASIC</span>
                    <div class="level-title">N5</div>
                    <div class="level-desc">はじめて</div>
                </div>
                <div class="level-card lv-n4" onclick="startLevel('n4')">
                    <span class="level-badge">ELEMENTARY</span>
                    <div class="level-title">N4</div>
                    <div class="level-desc">すこし むずかしい</div>
                </div>
                <div class="level-card lv-n3" onclick="startLevel('n3')">
                    <span class="level-badge">INTERMEDIATE</span>
                    <div class="level-title">N3</div>
                    <div class="level-desc">もっと むずかしい</div>
                </div>
            </div>
        </div>

        <div id="game-card" class="game-card" style="display:none;">
            <!-- Game dynamic HTML injected here -->
        </div>

    </div>

    <!-- Firebase and Auth -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>

    <script>
        const kanjiData = {
            n5: [
                { kanji: "休", parts: ["亻", "木"], reading: "やすむ", falseParts: ["彳", "本", "水"] },
                { kanji: "明", parts: ["日", "月"], reading: "あかるい", falseParts: ["目", "木", "水"] },
                { kanji: "林", parts: ["木", "木"], reading: "はやし", falseParts: ["氵", "十", "土"] },
                { kanji: "話", parts: ["言", "舌"], reading: "はなす", falseParts: ["口", "古", "十"] },
                { kanji: "語", parts: ["言", "吾"], reading: "かたる", falseParts: ["氵", "口", "五"] },
                { kanji: "読", parts: ["言", "売"], reading: "よむ", falseParts: ["氵", "買", "見"] },
                { kanji: "聞", parts: ["門", "耳"], reading: "きく", falseParts: ["日", "目", "口"] },
                { kanji: "男", parts: ["田", "力"], reading: "おとこ", falseParts: ["日", "木", "土"] },
                { kanji: "岩", parts: ["山", "石"], reading: "いわ", falseParts: ["右", "水", "土"] }
            ],
            n4: [
                { kanji: "待", parts: ["彳", "寺"], reading: "まつ", falseParts: ["扌", "日", "寸"] }, 
                { kanji: "持", parts: ["扌", "寺"], reading: "もつ", falseParts: ["氵", "木", "土"] },
                { kanji: "時", parts: ["日", "寺"], reading: "とき", falseParts: ["氵", "扌", "月"] },
                { kanji: "池", parts: ["氵", "也"], reading: "いけ", falseParts: ["土", "日", "木"] },
                { kanji: "地", parts: ["土", "也"], reading: "ち", falseParts: ["氵", "日", "木"] },
                { kanji: "作", parts: ["亻", "乍"], reading: "つくる", falseParts: ["彳", "日", "水"] },
                { kanji: "昨", parts: ["日", "乍"], reading: "きのう", falseParts: ["月", "彳", "木"] },
                { kanji: "答", parts: ["竹", "合"], reading: "こたえ", falseParts: ["草", "木", "口"] },
                { kanji: "飲", parts: ["飠", "欠"], reading: "のむ", falseParts: ["氵", "攵", "食"] }
            ],
            n3: [
                { kanji: "辞", parts: ["舌", "辛"], reading: "やめる", falseParts: ["言", "幸", "口"] },
                { kanji: "疲", parts: ["疒", "皮"], reading: "つかれる", falseParts: ["广", "波", "病"] },
                { kanji: "破", parts: ["石", "皮"], reading: "やぶる", falseParts: ["土", "波", "右"] },
                { kanji: "波", parts: ["氵", "皮"], reading: "なみ", falseParts: ["水", "石", "土"] },
                { kanji: "板", parts: ["木", "反"], reading: "いた", falseParts: ["扌", "本", "土"] },
                { kanji: "坂", parts: ["土", "反"], reading: "さか", falseParts: ["木", "石", "山"] },
                { kanji: "飯", parts: ["飠", "反"], reading: "めし", falseParts: ["食", "土", "木"] },
                { kanji: "勝", parts: ["月", "券"], reading: "かつ", falseParts: ["日", "力", "巻"] },
                { kanji: "悲", parts: ["非", "心"], reading: "かなしい", falseParts: ["水", "思", "木"] }
            ]
        };

        let currentLevelId = 'n5';
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedParts = [];
        let currentLevelQuestions = [];
        let gameActive = false;
        let pendingTimeouts = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function safeUpdate(id, func) {
            const el = document.getElementById(id);
            if (el) func(el);
        }

        function renderGameTemplate() {
            const gameCard = document.getElementById('game-card');
            gameCard.innerHTML = `
                <h2 style="color: #8e44ad; margin-top: 0; outline: none;">
                    <i class="fa-solid fa-layer-group"></i> 部首がったいパズル
                    <span style="font-size:0.5em; background:#eee; padding:5px 10px; border-radius:10px; margin-left:10px; color:#555;">${currentLevelId.toUpperCase()}</span>
                </h2>

                <div class="status-bar">
                    <span id="question-counter">問題: --/--</span>
                    <span id="score-display">正解: 0</span>
                </div>

                <div class="reading-box">
                    <div style="font-size:0.5em; color:#999; margin-bottom: 5px;">この漢字を作ろう！</div>
                    <strong id="target-reading">--</strong>
                </div>

                <div id="parts-grid" class="parts-grid"></div>

                <div class="combine-area" id="combine-area">
                    <span id="slot-1" style="border-bottom: 3px dashed #ccc; width:60px; height:80px; display:inline-block; font-size:0.8em; line-height:80px; text-align:center;"></span>
                    <span class="plus-sign"><i class="fa-solid fa-plus"></i></span>
                    <span id="slot-2" style="border-bottom: 3px dashed #ccc; width:60px; height:80px; display:inline-block; font-size:0.8em; line-height:80px; text-align:center;"></span>
                </div>
                
                <div style="margin-top:20px;">
                    <button onclick="backToMenu()" class="btn-back"><i class="fa-solid fa-arrow-left"></i> やめる</button>
                </div>
            `;
        }

        function startLevel(level) {
            currentLevelId = level;
            document.getElementById('level-select-view').style.display = 'none';
            document.getElementById('game-card').style.display = 'block';
            initGame();
        }

        function backToMenu() {
            gameActive = false;
            pendingTimeouts.forEach(clearTimeout);
            pendingTimeouts = [];
            document.getElementById('game-card').style.display = 'none';
            document.getElementById('level-select-view').style.display = 'block';
        }

        function initGame() {
            renderGameTemplate();
            currentLevelQuestions = shuffle([...kanjiData[currentLevelId]]).slice(0, 10);
            currentQuestionIndex = 0;
            score = 0;
            gameActive = true;
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestionIndex >= currentLevelQuestions.length) {
                endGame();
                return;
            }

            selectedParts = [];
            const q = currentLevelQuestions[currentQuestionIndex];
            
            safeUpdate('question-counter', el => el.textContent = `問題: ${currentQuestionIndex + 1}/${currentLevelQuestions.length}`);
            safeUpdate('score-display', el => el.textContent = `正解: ${score}`);
            safeUpdate('target-reading', el => el.textContent = q.reading);
            
            safeUpdate('combine-area', el => {
                el.innerHTML = `
                    <span id="slot-1" style="border-bottom: 3px dashed #ccc; width:60px; height:80px; display:inline-block; font-size:0.8em; line-height:80px; text-align:center;"></span>
                    <span class="plus-sign"><i class="fa-solid fa-plus"></i></span>
                    <span id="slot-2" style="border-bottom: 3px dashed #ccc; width:60px; height:80px; display:inline-block; font-size:0.8em; line-height:80px; text-align:center;"></span>
                `;
            });

            // Prepare choices: correct and false parts
            let choices = [...q.parts, ...q.falseParts.slice(0, 4 - q.parts.length)];
            
            // Generate random fallbacks across any valid category
            const allCategories = Object.keys(kanjiData);
            while(choices.length < 6) {
                 const randCat = allCategories[Math.floor(Math.random() * allCategories.length)];
                 const randList = kanjiData[randCat];
                 const randomKanji = randList[Math.floor(Math.random() * randList.length)];
                 const randomPart = randomKanji.parts[Math.floor(Math.random() * randomKanji.parts.length)];
                 if(!choices.includes(randomPart)) choices.push(randomPart);
            }
            choices = choices.slice(0, 6);
            choices = shuffle(choices);

            safeUpdate('parts-grid', el => {
                el.innerHTML = '';
                choices.forEach(part => {
                    const btn = document.createElement('button');
                    btn.className = 'part-btn';
                    btn.textContent = part;
                    btn.onclick = () => handlePartClick(btn, part, q);
                    el.appendChild(btn);
                });
            });
            gameActive = true;
        }

        function handlePartClick(btn, part, q) {
            if (!gameActive) return;
            
            const alreadySelected = selectedParts.find(p => p.btn === btn);
            if (alreadySelected) {
                btn.classList.remove('selected');
                selectedParts = selectedParts.filter(p => p.btn !== btn);
                updateSlots();
                return;
            }

            if (selectedParts.length >= 2) return;

            btn.classList.add('selected');
            selectedParts.push({ btn, part });
            updateSlots();

            if (selectedParts.length === 2) {
                gameActive = false;
                checkAnswer(q);
            }
        }

        function updateSlots() {
            safeUpdate('slot-1', el => {
                el.textContent = selectedParts[0] ? selectedParts[0].part : '';
                el.style.borderBottom = selectedParts[0] ? 'none' : '3px dashed #ccc';
            });
            safeUpdate('slot-2', el => {
                el.textContent = selectedParts[1] ? selectedParts[1].part : '';
                el.style.borderBottom = selectedParts[1] ? 'none' : '3px dashed #ccc';
            });
        }

        function checkAnswer(q) {
            const selectedChars = selectedParts.map(p => p.part);
            let isCorrect = true;
            
            const temp = [...q.parts];
            for (let c of selectedChars) {
                const idx = temp.indexOf(c);
                if (idx !== -1) {
                    temp.splice(idx, 1);
                } else {
                    isCorrect = false;
                    break;
                }
            }

            if (isCorrect && temp.length === 0) {
                score++;
                selectedParts.forEach(p => {
                    p.btn.classList.add('correct');
                    p.btn.classList.remove('selected');
                });
                
                safeUpdate('combine-area', el => {
                    el.innerHTML = `<span class="merged-kanji">${q.kanji}</span>`;
                });

                if(window.Antigravity && window.Antigravity.addPoint) {
                    window.Antigravity.addPoint('kanji_lab', 'combine_' + q.kanji);
                }

                try {
                    const audio = new Audio('assets/sounds/correct.mp3');
                    audio.play().catch(e => console.log('Audio error:', e));
                } catch(e) {}

                const tid = setTimeout(() => {
                    if (!document.getElementById('combine-area')) return;
                    currentQuestionIndex++;
                    nextQuestion();
                }, 1500);
                pendingTimeouts.push(tid);
            } else {
                selectedParts.forEach(p => {
                    p.btn.classList.add('wrong');
                });
                
                try {
                    const audio = new Audio('assets/sounds/wrong.mp3');
                    audio.play().catch(e => console.log('Audio error:', e));
                } catch(e) {}

                const tid = setTimeout(() => {
                    if (!document.getElementById('parts-grid')) return;
                    selectedParts.forEach(p => {
                        p.btn.classList.remove('wrong');
                        p.btn.classList.remove('selected');
                    });
                    selectedParts = [];
                    updateSlots();
                    gameActive = true;
                }, 600);
                pendingTimeouts.push(tid);
            }
        }

        function endGame() {
            gameActive = false;
            safeUpdate('game-card', el => {
                el.innerHTML = `
                    <h2 style="color: #8e44ad;"><i class="fa-solid fa-trophy"></i> ゲームクリア！</h2>
                    <div style="font-size: 5em; margin: 20px 0;">🎯</div>
                    <h3>正解: ${score} / ${currentLevelQuestions.length}</h3>
                    <p style="color:#666; font-weight:bold;">よくできました！ポイントも記録されたよ！</p>
                    <div style="margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
                        <button onclick="initGame()" style="background:#8e44ad; color:white; border:none; padding:15px 30px; border-radius:30px; font-size:1.2em; font-weight:bold; cursor:pointer; width:100%; max-width:250px; box-shadow: 0 4px 0 #732d91;">もういちど</button>
                        <button onclick="backToMenu()" style="background:#eee; color:#555; border:none; padding:15px 30px; border-radius:30px; font-size:1.2em; font-weight:bold; cursor:pointer; width:100%; max-width:250px; margin-top: 10px; box-shadow: 0 4px 0 #ccc;">レベルをえらぶ</button>
                    </div>
                `;
            });
        }

        window.addEventListener('beforeunload', () => {
            pendingTimeouts.forEach(clearTimeout);
        });

    </script>
    <script src="js/common_ui.js"></script>
</body>
</html>
