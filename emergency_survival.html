<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>緊急・薬局サバイバル</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/emergency_survival.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>

<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


    <header>
        <div style="font-weight:900; font-size:1.1em;"><i class="fa-solid fa-truck-medical"></i> 緊急サバイバル</div>
        <div style="display: flex; gap: 10px;">
            <button class="header-btn" onclick="goBack()" id="header-back-btn" style="display:none;">
                <i class="fa-solid fa-arrow-left"></i> 戻る
            </button>
            <button class="header-btn" onclick="location.href='index.html'" id="header-home-btn">
                <i class="fa-solid fa-house"></i> ホーム
            </button>
        </div>
    </header>

    <div id="main-container">

        <div id="screen-learning" class="screen active">
            <h2 style="text-align:center; color:#c62828; margin-bottom:20px;">ピンチの時に使う言葉</h2>
            <div id="learning-content"></div>
            <div style="height: 60px;"></div>
        </div>

        <div id="screen-select" class="screen">
            <h2 style="text-align:center; color:#c62828;">シチュエーションを選択</h2>
            <div class="mode-select-grid">
                <button class="mode-btn med-mode" onclick="startGame('pharmacy')">
                    <i class="fa-solid fa-pills"></i>
                    <span class="mode-title">症状・薬局</span>
                    <span class="mode-desc">体調不良や、薬を買う時の言葉</span>
                </button>
                <button class="mode-btn emg-mode" onclick="startGame('emergency')">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span class="mode-title">緊急・トラブル</span>
                    <span class="mode-desc">助けを呼ぶ時や、忘れ物をした時</span>
                </button>
            </div>
        </div>

        <div id="screen-game" class="screen">
            <div class="game-header">
                <span id="game-title">症状・薬局</span> <span id="game-progress"
                    style="margin-left:10px; color:#999;">(1/8)</span>
            </div>

            <div class="situation-area">
                <span class="situation-label"><i class="fa-regular fa-comment-dots"></i> Situation (状況)</span>
                <div class="situation-text" id="situation-text">You have a headache.</div>
            </div>

            <div class="player-area" id="player-area-box">
                <div class="target-label">こう言いましょう（マイクを押して読んでね）</div>
                <div class="target-phrase" id="target-phrase">頭が痛いです</div>

                <button class="mic-btn" id="mic-btn" onclick="toggleSpeechRecognition()">
                    <i class="fa-solid fa-microphone"></i>
                </button>

                <div class="feedback-text" id="feedback-text"></div>
                <div class="recognized-text" id="recognized-text"></div>
            </div>
        </div>

    </div>

    <button id="start-game-btn" class="fixed-bottom-btn" onclick="showScreen('screen-select')">
        <i class="fa-solid fa-kit-medical"></i> ゲームスタート！
    </button>

    <script src="js/emergency_survival.js"></script>


<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=practice";
};
</script>


<script>
// Antigravity Session Cleanup
window.addEventListener('antigravity-session-end', function() {
    if (typeof window.performNavCleanup === 'function') {
        window.performNavCleanup();
    }
});
</script>

<script>
// Antigravity Session Cleanup
window.addEventListener('antigravity-session-end', function() {
    if (typeof window.performNavCleanup === 'function') {
        window.performNavCleanup();
    }
});
</script>
</body>



</html>
