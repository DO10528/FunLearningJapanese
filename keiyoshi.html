<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>形容詞クイズ</title>
    <link rel="stylesheet" href="assets/css/style.css"> <link rel="stylesheet" href="css/keiyoshi.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0BX3DD42C1"></script>
    <script src="js/keiyoshi.js"></script>

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


    <h1>形容詞 英語意味当てクイズ</h1>

    <div class="quiz-container">
        <div id="auth-status">認証中...</div>

        <div class="image-box">
            <img id="quiz-image" src="" alt="クイズ画像">
        </div>

        <div class="question-area">
            <p id="question-number">第 1 問</p>
            <p>この意味に合う形容詞を選びなさい：</p>
            <h2 id="question-meaning">意味が表示されます...</h2>
        </div>

        <div class="choices" id="choices-container">
            </div>

        <div id="result-message" class="result-message" style="display: none;">
            </div>
        
        <div id="final-score" style="display: none;">
            </div>

        <div class="navigation-buttons">
            <button id="home-button">ホームに戻る</button>
            <button id="restart-button" style="display: none;">もう一度プレイ</button>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>

    <script src="js/keiyoshi.js"></script>


<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html?cat=keiyoshi_game";
};
</script>

</body>
</html>
