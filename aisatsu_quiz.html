<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>あいさつゲーム - FunLearnJP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/aisatsu_quiz.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>

    
    <header>
        <div class="header-container">
            <h1>あいさつゲーム</h1>
            <a href="index.html" class="home-link"><i class="fa-solid fa-house"></i> ホームへ</a>
        </div>
    </header>

    <div class="aq-main-container">
        <div id="aq-container">
        
            <div id="auth-status-aisatsu">認証中...</div>

            <div id="aq-screen-study" class="aq-screen active">
                <h1>あいさつ を おぼえよう</h1>
                <p>イラストを タップ して おとを きいてね。</p>
                <div id="aq-study-grid">
                    </div>
                <button id="aq-start-quiz-button" class="aq-button">クイズを はじめる</button>
                <a href="index.html" class="aq-button aq-button-secondary">ホームにもどる</a>
            </div>
            
            <div id="aq-screen-quiz" class="aq-screen">
                <div class="question-area">
                    <p id="aq-question-number">だい 1 もん</p>
                    <div id="aq-timer-box" style="display: none;">のこり 10 びょう</div> 
                    
                    <p style="color:#444; font-size:1.1em;">ただしい あいさつを えらんでね：</p>
                    
                    <div class="question-prompt-container">
                        <h2 id="aq-question-text">もんだい...</h2> 
                        <button id="aq-play-sound-button" class="sound-button"><i class="fa-solid fa-volume-up"></i></button>
                    </div>
                </div>

                <div class="choices" id="aq-choices-container"></div>

                <div id="aq-result-message" class="result-message"></div>
                <div id="aq-final-score"></div>

                <div class="navigation-buttons" style="text-align:center; margin-top:20px;">
                    <button id="aq-restart-button" class="aq-button aq-button-secondary" style="background-color: #00bcd4; display:none; margin: 0 auto;">
                        <i class="fa-solid fa-rotate-right"></i> もういちど あそぶ
                    </button>
                    <a href="index.html" id="aq-home-button" class="aq-button aq-button-secondary" style="margin: 20px auto; display:none;">
                        <i class="fa-solid fa-house"></i> ホームにもどる
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    
    <script src="js/aisatsu_quiz.js"></script>

<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=word_other";
};
</script>

</body>
</html>
