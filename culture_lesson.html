<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合戦 - 戦国・日本語伝</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/culture_lesson.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


<div class="battle-header">
    <div class="level-badge" id="level-display">出陣</div>
    <a href="culture_map.html" class="retreat-btn">撤退</a>
</div>

<div class="main-area">
    <div id="learn-area" class="scroll-paper">
        <i id="learn-img" class="fa-solid fa-question card-img"></i>
        <h1 id="learn-jp" class="card-word">...</h1>
        <div id="learn-en" class="card-en">...</div>
        <button class="next-btn" style="margin-top:20px; width:60px; height:60px; padding:0; border-radius:50%;" onclick="playAudio()">
            <i class="fa-solid fa-volume-high"></i>
        </button>
    </div>

    <div id="quiz-area" class="hidden" style="width:100%;">
        <div class="quiz-title-overlay" id="quiz-overlay">
            <div class="quiz-title-text">いざ、勝負！</div>
        </div>

        <div style="text-align:center; margin-bottom:20px;">
             <button onclick="playQuizAudio()" style="background:#ffca28; border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer; font-size:1.1em; color:#333;">
                <i class="fa-solid fa-volume-high"></i> 音をきく
            </button>
        </div>
        <div class="quiz-grid" id="quiz-options"></div>
    </div>

    <button id="action-btn" class="next-btn" onclick="nextStep()">次へ</button>
</div>

<div class="loot-modal" id="loot-modal">
    <h1 style="color:#f44336; font-family:'Yuji Syuku', serif; font-size:3em; margin:0;">勝利!!</h1>
    <div id="item-view" class="hidden">
        <div class="loot-item" id="loot-icon"></div>
        <div class="loot-name" id="loot-name"></div>
        <p style="font-size:1.2em;">戦利品を獲得しました</p>
    </div>
    <button class="next-btn" onclick="goBackToMap()">凱旋する</button>
</div>

<script type="module" src="js/firebase-config.js"></script>


<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=";
};
</script>

</body>
</html>
