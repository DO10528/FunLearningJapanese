<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たから さがしゲーム - FunLearnJP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    
<link rel="stylesheet" href="css/treasure_Hunt.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>

    
    <header>
        <div class="header-container">
            <h1>たから さがしゲーム</h1>
            <a href="index.html" class="home-link"><i class="fa-solid fa-house"></i> ホームへ</a>
        </div>
    </header>

    <div class="sc-main">
        <div id="sc-container">
        
            <div id="auth-status-sc">認証中...</div>
            
            <div id="sc-screen-topic" class="sc-screen active">
                <h1>たから さがし</h1>
                <p>どれで あそぶ？</p>
                <div id="sc-topic-grid">
                    </div>
            </div>

            <div id="sc-screen-study" class="sc-screen">
                <h2 id="sc-study-title">ことばをおぼえよう</h2>
                <p style="text-align: center;">タップして おとを きいてね。</p>
                <div id="sc-study-grid"></div>
                <button id="sc-start-game-button" class="sc-button">ゲームをはじめる</button>
                <button class="sc-button sc-button-secondary sc-back-to-topic"><i class="fa-solid fa-arrow-left"></i> トピックをえらぶ</button>
            </div>

            <div id="sc-screen-game" class="sc-screen">
                <h2>さがしものゲーム</h2>
                <p id="sc-game-prompt">したのボタンをおして、きこえたものを さがしてね！</p>
                <button id="sc-play-sound-button" class="sc-button">▶ おとを きく</button>
                <button id="sc-open-camera-button" class="sc-button sc-button-camera" style="display: none;">
                    📷 カメラを ひらく
                </button>
                <button class="sc-button sc-button-secondary sc-back-to-topic"><i class="fa-solid fa-arrow-left"></i> やめる</button>
            </div>

            <div id="sc-screen-camera" class="sc-screen">
                <h2>みつけたら、しゃしんをとろう！</h2>
                <div id="sc-camera-view-wrapper">
                    <video id="sc-video-element" autoplay playsinline></video>
                    <canvas id="sc-canvas-element"></canvas>
                </div>
                <button id="sc-take-picture-button" class="sc-button sc-button-camera">
                    📸 しゃしんをとる
                </button>
                <button id="sc-cancel-camera-button" class="sc-button sc-button-secondary">
                    もどる
                </button>
            </div>

            <div id="sc-screen-result" class="sc-screen">
                <h2>こたえあわせ</h2>
                <div id="sc-result-comparison-area">
                    <div class="sc-result-box">
                        <h3>もんだい</h3>
                        <img id="sc-problem-image" src="" alt="もんだいの え">
                        <p id="sc-problem-name"></p>
                    </div>
                    <div class="sc-result-box">
                        <h3>あなたのしゃしん</h3>
                        <img id="sc-result-image" src="" alt="さつえいした しゃしん">
                    </div>
                </div>
                
                <p id="sc-point-feedback" style="font-weight: bold; font-size: 1.2em; margin-top: 20px; color: var(--primary);">
                    おなじ でしたか？
                </p>
                
                <div id="sc-self-assess-buttons">
                     <button id="sc-correct-button" class="sc-button" style="background-color: var(--correct-color);">⭕️ はい！</button>
                     <button id="sc-incorrect-button" class="sc-button" style="background-color: var(--incorrect-color);">❌ いいえ</button>
                </div>
                <button class="sc-button sc-button-secondary sc-back-to-topic" style="margin-top: 20px;"><i class="fa-solid fa-arrow-left"></i> トピックをえらぶ</button>
            </div>
        </div>
    </div>

    <script src="js/treasure_Hunt.js"></script>
    
    <script type="module" src="js/firebase-config.js"></script>

<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=word_other";
};
</script>

</body>
</html>
