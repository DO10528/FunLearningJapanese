<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>カタカナ・おとあてブロック - FunLearnJP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/katakana_block.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


<header>
    <a href="index.html" class="logo"><i class="fa-solid fa-cube"></i> カタカナ・おとあて</a>
    <a href="index.html" class="home-link"><i class="fa-solid fa-house"></i> ホーム</a>
</header>

<div class="container">
    <div id="auth-status">認証中...</div>

    <div id="level-screen" class="screen active">
        <h2 style="color:#ff5252;">レベルを えらんでね</h2>
        <div class="level-grid" id="level-grid"></div>
    </div>

    <div id="practice-screen" class="screen">
        <h2><i class="fa-solid fa-chalkboard-user"></i> れんしゅう</h2>
        <p>ブロックをおして おとを きいてね！</p>
        <div class="practice-row" id="practice-container"></div>
        <button class="action-btn" style="background:var(--primary); box-shadow:0 5px 0 #e65100;" onclick="startGame()">
            <i class="fa-solid fa-play"></i> ゲームスタート！
        </button>
        <button onclick="showScreen('level-screen')" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">もどる</button>
    </div>

    <div id="game-screen" class="screen">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <button onclick="showScreen('level-screen')" style="background:#ddd; border:none; border-radius:10px; padding:5px 10px;">やめる</button>
            <div id="level-indicator" style="font-weight:bold; color:var(--primary);">Level ?</div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; width:100%; text-align:center; font-size:0.8em; color:#888; margin-bottom:5px;">
            <div>もじ (Drag)</div>
            <div>こたえ (Drop)</div>
            <div>おと</div>
        </div>
        <div class="game-board" id="game-board"></div>
        <div id="judge-msg" style="height:30px; margin-top:10px; font-weight:bold; font-size:1.2em; color:#ff9800;"></div>
    </div>
</div>

<script type="module" src="js/firebase-config.js"></script>

<script src="js/katakana_block.js"></script>

<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=katakana";
};
</script>

</body>
</html>
