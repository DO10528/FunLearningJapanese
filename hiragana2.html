<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな並び替え - FunLearnJP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/hiragana2.css">

    <link rel="stylesheet" href="css/common_ui.css">
</head>

<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


    <header>
        <a href="index.html" class="logo"><i class="fa-solid fa-shapes"></i> FunLearnJP</a>
        <a href="index.html" class="home-icon"><i class="fa-solid fa-house"></i></a>
    </header>

    <div class="main-container">

        <div id="main-menu-2" class="pop-in">
            <div class="game-card">
                <i class="fa-solid fa-sort-alpha-down menu-icon"></i>
                <h1 class="menu-title">ならびかえ</h1>
                <p class="menu-desc">もじ を ならびかえて<br>ただしい ことば をつくろう！</p>

                <div style="background:#e8f5e9; padding:10px; border-radius:10px; margin-bottom:20px; color:#2e7d32;">
                    ぜんぶで <strong>10もん</strong> あるよ！
                    <div id="auth-status" style="margin-top:5px; font-size:0.9em; font-weight:normal; color:#1a6e1d;">
                        認証中...</div>
                </div>

                <button id="startButtonGame2" class="start-btn">
                    <i class="fa-solid fa-play"></i> スタート！
                </button>
                <a href="index.html" class="home-btn-text">ホームにもどる</a>
            </div>
        </div>

        <div id="game-area-2" style="display:none;" class="pop-in">
            <div class="score-board">
                <span id="turn-msg">問 1 / 10</span>
                <span><i class="fa-solid fa-star" style="color:#f0ad4e;"></i> <span id="score-val">0</span></span>
            </div>
            <div class="game-card">
                <div id="image-area" class="image-frame"></div>

                <!-- 音声ヒントボタン (44px以上のタップ領域を確保) -->
                <div style="text-align: center; margin-bottom: 15px;">
                    <button id="hint-speak-btn"
                        style="background-color: #ff9800; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 1.1em; font-weight: bold; cursor: pointer; min-height: 44px; min-width: 140px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        <i class="fa-solid fa-volume-high"></i> 音声をきく
                    </button>
                </div>

                <div class="instruction-text">ここに もじ をいれてね</div>
                <div id="answer-container" class="drop-zone-container"></div>
                <div class="instruction-text">つかう もじ</div>
                <div id="pool-container" class="pool-container"></div>
                <div>
                    <button id="checkButton" class="check-btn" onclick="game.checkAnswer()">できた！</button>
                </div>
                <p id="feedback" class="feedback-msg"></p>
                <div style="margin-top: 10px;">
                    <button onclick="location.reload()"
                        style="background:none; border:none; color:#999; cursor:pointer; text-decoration:underline;">やめる</button>
                </div>
            </div>
        </div>

    </div>

    <audio id="snd-correct" src="assets/sounds/seikai.mp3"></audio>
    <audio id="snd-incorrect" src="assets/sounds/bubu.mp3"></audio>
    <audio id="snd-fanfare" src="assets/sounds/fanfare.mp3"></audio>

    <script type="module" src="js/firebase-config.js"></script>

    <script src="js/common_ui.js"></script>
    <script src="js/hiragana2.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=hiragana";
};
</script>

</body>

</html>
