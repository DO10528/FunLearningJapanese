<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本旅行サバイバル - 学習ワークシート</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/japan_travel_survival.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


<button class="fab-print no-print" onclick="window.print()"><i class="fa-solid fa-print"></i></button>

<div class="sheet">
    <header>
        <div>
            <h1>日本旅行サバイバル</h1>
            <div style="font-size:0.9em; margin-top:5px;">書き取り練習ワークシート (Writing Practice)</div>
        </div>
        <div class="name-box">
            <span class="name-label">Name:</span>
        </div>
    </header>

    <div class="section-title"><i class="fa-solid fa-map-pin"></i> 場所 (Places)</div>
    <div class="grid">
        <div id="places-container-left"></div>
        <div id="places-container-right"></div>
    </div>

    <div class="section-title"><i class="fa-solid fa-diamond-turn-right"></i> 方向 (Directions)</div>
    <div class="grid">
        <div id="directions-container"></div>
        <div id="directions-container-2"></div>
    </div>

    <div class="section-title"><i class="fa-solid fa-list-ol"></i> 順番 (Order)</div>
    <div class="grid">
        <div id="counters-container"></div>
        <div id="counters-container-2"></div>
    </div>

    <div class="section-title"><i class="fa-solid fa-comment-dots"></i> 会話 (Phrases)</div>
    <div class="phrase-box">
        <div class="phrase-row">
            <div style="font-size:0.9em; color:#555; margin-bottom:5px;">Q: Where is the [Place]?</div>
            <div style="font-size:1.2em;">
                <span style="color:#ccc;">すみません、</span>
                <span class="phrase-line" style="width:100px;"></span>
                は どこですか？
            </div>
        </div>
        <div class="phrase-row">
            <div style="font-size:0.9em; color:#555; margin-bottom:5px;">A: Go straight and turn right at the 2nd corner.</div>
            <div style="font-size:1.2em;">
                まっすぐ いって、
                <span class="phrase-line" style="width:80px;"></span>
                の 角(かど)を
                <span class="phrase-line" style="width:60px;"></span>
                に 曲がって ください。
            </div>
        </div>
    </div>

    <div style="text-align:center; font-size:0.8em; margin-top:20px; color:#999;">
        Fun Learning Japanese - Original Worksheet
    </div>
</div>

<script src="js/japan_travel_survival.js"></script>


<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=";
};
</script>

</body>
</html>
