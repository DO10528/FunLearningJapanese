<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字・文章ワークシート - FunLearnJP</title>
    <link rel="stylesheet" href="css/kanji_sentence_book.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


<div class="no-print" style="text-align: center; margin-bottom: 20px;">
    <button onclick="window.print()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">🖨️ ワークシートを印刷する</button>
</div>

<div class="worksheet-container">
    <h1>漢字・文章 練習ワークシート</h1>

    <div class="header-info">
        <div>がつ　　にち</div>
        <div class="name-box">なまえ：</div>
    </div>

    <div class="instruction">（　）の 読みかたに あう 漢字を、あとの 3つの中から えらんで ◯を つけましょう。</div>

    <h2>Lv.1 たんぶん</h2>
    <div id="lv1-container"></div>

    <div class="page-break"></div>

    <h2>Lv.2 A-B かいわ</h2>
    <div id="lv2-container"></div>

    <div class="page-break"></div>

    <h2>Lv.3 A-B-C かいわ</h2>
    <div id="lv3-container"></div>
</div>

<script src="js/kanji_sentence_book.js"></script>


<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html?cat=";
};
</script>

</body>
</html>
