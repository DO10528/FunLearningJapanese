<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>とけいゲーム レベル2</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/clock2.css">

<link rel="stylesheet" href="css/common_ui.css">
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


    <div id="tc-container">
    
        <div id="auth-status-tc2">認証中...</div>

        <div id="tc-screen-study" class="tc-screen active">
            <h1>「ふん」と「ぷん」</h1>
            <p>タップして おと を きいてね。</p>
            <div id="tc-study-grid"></div>
            <button id="tc-btn-to-modes" class="tc-button">ゲームを はじめる</button>
            <a href="index.html" class="tc-button tc-button-secondary">ホームにもどる</a>
        </div>

        <div id="tc-screen-modes" class="tc-screen">
            <h2>どのゲームであそぶ？</h2>
            <button class="tc-button btn-game1" onclick="startSpecificQuiz(1)">
                <i class="fa-solid fa-ear-listen"></i> ゲーム1：きいて えらぼう
            </button>
            <button class="tc-button btn-game2" onclick="startSpecificQuiz(2)">
                <i class="fa-solid fa-eye"></i> ゲーム2：みて えらぼう
            </button>
            <button class="tc-button btn-game3" onclick="startSpecificQuiz(3)">
                <i class="fa-solid fa-microphone"></i> ゲーム3：はなしてみよう
            </button>
            <button class="tc-button tc-button-secondary" onclick="showScreen(document.getElementById('tc-screen-study'))">べんきょう に もどる</button>
        </div>

        <div id="tc-screen-quiz" class="tc-screen">
            <h2 id="tc-quiz-title">この とけい は なんじ？</h2>
            
            <div id="tc-quiz-prompt-area"></div>
            <div id="tc-quiz-options"></div>
            
            <div id="tc-quiz3-area" style="display:none; text-align:center;">
                <div id="quiz3-instruction" style="font-size:1.2em; font-weight:bold; margin-bottom:10px; color:#00838f;"></div>
                <button id="tc-mic-btn" class="mic-btn" onclick="toggleMic()">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <div id="quiz3-transcript" style="color:#666; font-size:0.9em; margin-top:5px; font-weight:bold;"></div>
            </div>
            
            <div id="tc-feedback"></div>
            
            <button class="tc-button tc-button-secondary" onclick="showScreen(document.getElementById('tc-screen-modes'))">ゲームを えらぶ</button>
        </div>

    </div>

    <audio id="tc-sound-correct" src="assets/sounds/seikai.mp3" preload="auto"></audio>
    <audio id="tc-sound-incorrect" src="assets/sounds/bubu.mp3" preload="auto"></audio>

    <script type="module" src="js/firebase-config.js"></script>
    
    <script src="js/clock2.js"></script>

<script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=clock";
};
</script>

</body>
</html>
