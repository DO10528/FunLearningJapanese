<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>漢字間違い探し - FunLearnJP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common_ui.css">
<style>
    body {
        background-color: #f4f7fc;
        font-family: 'Zen Maru Gothic', sans-serif;
        margin: 0;
        padding: 0;
        padding-bottom: 80px;
        -webkit-tap-highlight-color: transparent;
    }
    header {
        background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 15px rgba(155, 89, 182, 0.3);
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .logo, .home-icon {
        color: white;
        text-decoration: none;
        font-size: 1.4em;
        font-weight: 900;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .main-container {
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
        text-align: center;
    }
    
    /* Level Select UI */
    .level-view { display: block; }
    .level-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
    .level-card {
        width: 140px; background: white; border-radius: 15px; padding: 20px 10px;
        text-align: center; cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        transition: transform 0.2s; border-bottom: 5px solid #ddd;
    }
    .level-card:active { transform: translateY(3px); border-bottom-width: 2px; }
    .level-badge {
        display: inline-block; padding: 3px 8px; border-radius: 12px;
        color: white; font-weight: bold; margin-bottom: 8px; font-size: 0.7em;
    }
    .level-title { font-size: 2em; font-weight: 900; line-height: 1; margin-bottom: 5px; color: #444; }
    .level-desc { font-size: 0.75em; color: #888; font-weight: bold; }
    .lv-n5 .level-badge { background-color: #e57373; } .lv-n5 { border-bottom-color: #e57373; }
    .lv-n4 .level-badge { background-color: #d32f2f; } .lv-n4 { border-bottom-color: #d32f2f; }
    .lv-n3 .level-badge { background-color: #f57c00; } .lv-n3 { border-bottom-color: #f57c00; }
    
    .btn-back {
        background: #eee; color: #555; border: none; padding: 10px 20px; border-radius: 20px;
        font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 0 #ccc;
    }
    .btn-back:active { transform: translateY(4px); box-shadow: none; }

    /* Game UI */
    .game-card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        margin-bottom: 20px;
    }
    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        font-size: 1.1em;
        font-weight: bold;
        color: #555;
    }
    .timer-display {
        font-size: 1.4em;
        color: #e74c3c;
    }
    .level-display {
        background: #fdf2e9;
        color: #d35400;
        padding: 5px 15px;
        border-radius: 20px;
    }
    .grid-board {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 5px;
        margin: 0 auto;
        max-width: 400px;
    }
    @media (max-width: 480px) {
        .grid-board {
            grid-template-columns: repeat(5, 1fr);
        }
    }
    .kanji-cell {
        background: #fff;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 2em;
        font-weight: bold;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        aspect-ratio: 1;
        cursor: pointer;
        transition: background 0.1s, transform 0.1s;
        touch-action: manipulation;
        user-select: none;
    }
    .kanji-cell:active {
        transform: scale(0.95);
        background: #eee;
    }
    .kanji-cell.correct-anim {
        background: #2ecc71;
        color: white;
        border-color: #27ae60;
        animation: pop 0.4s;
        pointer-events: none;
    }
    .kanji-cell.wrong-anim {
        background: #e74c3c;
        color: white;
        border-color: #c0392b;
        animation: shake 0.4s;
    }
    @keyframes pop {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
    }
</style>
</head>
<body>

<!-- スマートナビゲーションバー -->
<div class="smart-nav-bar">
    <button class="smart-nav-btn" onclick="exitGameToHome()" aria-label="ホームに戻る">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="smart-nav-btn" onclick="exitGameToCategory()" aria-label="前に戻る">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </button>
</div>


    <header>
        <a href="index.html" class="logo"><i class="fa-solid fa-shapes"></i> FunLearnJP</a>
        <a href="index.html" class="home-icon"><i class="fa-solid fa-house"></i></a>
    </header>

    <div class="main-container">
        <!-- Level UI -->
        <div id="level-select-view" class="level-view">
            <h2 style="color: #8e44ad; margin-top: 0;"><i class="fa-solid fa-magnifying-glass"></i> 漢字間違い探し</h2>
            <p style="color:#555; font-weight:bold;">レベルをえらんでね</p>
            <div class="level-grid">
                <div class="level-card lv-n5" onclick="startLevel('n5')">
                    <span class="level-badge">BASIC</span>
                    <div class="level-title">N5</div>
                    <div class="level-desc">はじめて</div>
                </div>
                <div class="level-card lv-n4" onclick="startLevel('n4')">
                    <span class="level-badge">ELEMENTARY</span>
                    <div class="level-title">N4</div>
                    <div class="level-desc">すこし むずかしい</div>
                </div>
                <div class="level-card lv-n3" onclick="startLevel('n3')">
                    <span class="level-badge">INTERMEDIATE</span>
                    <div class="level-title">N3</div>
                    <div class="level-desc">もっと むずかしい</div>
                </div>
            </div>
        </div>

        <!-- Gameplay screen -->
        <div id="game-card" class="game-card" style="display:none;">
            <!-- Game dynamic HTML injected here -->
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>

    <script>
        const kanjiPairs = {
            n5: [
                { normal: "大", anomaly: "犬" }, { normal: "犬", anomaly: "大" },
                { normal: "木", anomaly: "本" }, { normal: "本", anomaly: "木" },
                { normal: "白", anomaly: "百" }, { normal: "百", anomaly: "白" },
                { normal: "王", anomaly: "玉" }, { normal: "玉", anomaly: "王" },
                { normal: "人", anomaly: "入" }, { normal: "入", anomaly: "人" },
                { normal: "千", anomaly: "干" }, { normal: "干", anomaly: "千" },
                { normal: "休", anomaly: "体" }, { normal: "体", anomaly: "休" },
                { normal: "力", anomaly: "刀" }, { normal: "刀", anomaly: "力" }
            ],
            n4: [
                { normal: "待", anomaly: "持" }, { normal: "持", anomaly: "待" },
                { normal: "右", anomaly: "石" }, { normal: "石", anomaly: "右" },
                { normal: "曰", anomaly: "日" },
                { normal: "鳥", anomaly: "烏" }, { normal: "烏", anomaly: "鳥" },
                { normal: "牛", anomaly: "午" }, { normal: "午", anomaly: "牛" },
                { normal: "買", anomaly: "貝" }, { normal: "貝", anomaly: "買" }
            ],
            n3: [
                { normal: "微", anomaly: "徴" }, { normal: "徴", anomaly: "微" },
                { normal: "土", anomaly: "士" }, { normal: "士", anomaly: "土" },
                { normal: "未", anomaly: "末" }, { normal: "末", anomaly: "未" },
                { normal: "考", anomaly: "老" }, { normal: "老", anomaly: "考" },
                { normal: "免", anomaly: "兎" }, { normal: "兎", anomaly: "免" },
                { normal: "壁", anomaly: "璧" }, { normal: "璧", anomaly: "壁" }
            ]
        };

        let currentLevelId = 'n5';
        let currentLevel = 1; // Used for grid size scaling
        let score = 0;
        let timeRemaining = 60;
        let gameActive = false;
        let timerInterval = null;
        let timeouts = [];

        function safeUpdate(id, func) {
            const el = document.getElementById(id);
            if (el) func(el);
        }

        function playSound(name) {
            try {
                const audio = new Audio('assets/sounds/' + name + '.mp3');
                audio.play().catch(e => console.log('Audio disabled'));
            } catch(e) {}
        }

        function renderGameTemplate() {
            const gameCard = document.getElementById('game-card');
            gameCard.innerHTML = `
                <div class="top-bar">
                    <span class="level-display" id="level-display">レベル: 1</span>
                    <span class="timer-display" id="timer-display"><i class="fa-solid fa-clock"></i> 60</span>
                </div>
                
                <p style="text-align:center; font-weight:bold; color:#777; margin-top:0;">違う漢字をタップしてね！</p>
                <div id="grid-board" class="grid-board">
                    <!-- Kanji cells injected here -->
                </div>
                
                <div style="margin-top:20px;">
                    <button onclick="backToMenu()" class="btn-back"><i class="fa-solid fa-arrow-left"></i> やめる</button>
                </div>
            `;
        }

        function startLevel(level) {
            currentLevelId = level;
            document.getElementById('level-select-view').style.display = 'none';
            document.getElementById('game-card').style.display = 'block';
            
            renderGameTemplate();
            
            currentLevel = 1;
            score = 0;
            timeRemaining = 60;
            gameActive = true;

            safeUpdate('timer-display', el => el.innerHTML = `<i class="fa-solid fa-clock"></i> ${timeRemaining}`);
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeRemaining--;
                safeUpdate('timer-display', el => el.innerHTML = `<i class="fa-solid fa-clock"></i> ${timeRemaining}`);
                if (timeRemaining <= 0) {
                    endGame();
                }
            }, 1000);

            renderBoard();
        }

        function renderBoard() {
            if (!gameActive) return;

            const categoryPairs = kanjiPairs[currentLevelId];
            const pair = categoryPairs[Math.floor(Math.random() * categoryPairs.length)];
            
            let totalCells = Math.min(12 + Math.floor(currentLevel * 1.5), 30);
            
            safeUpdate('level-display', el => el.innerHTML = `${currentLevelId.toUpperCase()} <span style="color:#aaa;">|</span> Lv: ${currentLevel}`);

            const board = document.getElementById('grid-board');
            if(!board) return;
            
            board.innerHTML = '';
            
            const anomalyIndex = Math.floor(Math.random() * totalCells);
            
            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'kanji-cell';
                cell.textContent = i === anomalyIndex ? pair.anomaly : pair.normal;
                
                cell.onclick = () => handleCellClick(cell, i === anomalyIndex);
                board.appendChild(cell);
            }
        }

        function handleCellClick(cell, isAnomaly) {
            if (!gameActive) return;
            if (cell.classList.contains('correct-anim') || cell.classList.contains('wrong-anim')) return;

            if (isAnomaly) {
                gameActive = false;
                cell.classList.add('correct-anim');
                score++;
                playSound('correct');

                if (window.Antigravity && window.Antigravity.addPoint) {
                    window.Antigravity.addPoint('kanji_lab', `detective_${currentLevelId}_${currentLevel}`);
                }

                const t = setTimeout(() => {
                    if (timeRemaining > 0) {
                        currentLevel++;
                        gameActive = true;
                        renderBoard();
                    }
                }, 400);
                timeouts.push(t);
            } else {
                cell.classList.add('wrong-anim');
                playSound('wrong');
                timeRemaining = Math.max(0, timeRemaining - 3);
                safeUpdate('timer-display', el => el.innerHTML = `<i class="fa-solid fa-clock"></i> ${timeRemaining}`);
                
                const t = setTimeout(() => {
                    if(document.body.contains(cell)) {
                        cell.classList.remove('wrong-anim');
                    }
                }, 400);
                timeouts.push(t);
            }
        }

        function endGame() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            
            safeUpdate('game-card', el => {
                el.innerHTML = `
                    <h2 style="color: #8e44ad;"><i class="fa-solid fa-flag-checkered"></i> タイムアップ！</h2>
                    <h3>見つけた数: <span style="font-size:1.5em; color:#e74c3c;">${score}</span> 個</h3>
                    <p style="color:#666; font-weight:bold;">ポイントも記録されたよ！すごいね！</p>
                    <div style="margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
                        <button onclick="startLevel('${currentLevelId}')" style="background:#8e44ad; color:white; border:none; padding:15px 30px; border-radius:30px; font-size:1.2em; font-weight:bold; cursor:pointer; width:100%; max-width:250px; box-shadow: 0 4px 0 #732d91;">もういちど</button>
                        <button onclick="backToMenu()" style="background:#eee; color:#555; border:none; padding:15px 30px; border-radius:30px; font-size:1.2em; font-weight:bold; cursor:pointer; width:100%; max-width:250px; margin-top: 10px; box-shadow: 0 4px 0 #ccc;">レベルをえらぶ</button>
                    </div>
                `;
            });
        }

        function backToMenu() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            timeouts.forEach(clearTimeout);
            timeouts = [];
            
            document.getElementById('game-card').style.display = 'none';
            document.getElementById('level-select-view').style.display = 'block';
        }

        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval);
            timeouts.forEach(clearTimeout);
        });

    </script>
    <script src="js/common_ui.js"></script>

<script>
// 【重要】画面遷移前にタイマーや音声を破棄する共通関数
window.performNavCleanup = function() {
    if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (typeof recognition !== 'undefined' && recognition !== null) {
        try { recognition.stop(); } catch(e) {}
    }
};

window.exitGameToHome = function() {
    if(window.performNavCleanup) window.performNavCleanup();
    window.location.href = "index.html";
};

window.exitGameToCategory = function() {
    if(window.performNavCleanup) window.performNavCleanup();

    // Heuristic Router: Find local "Back/Quit" buttons to go up ONE tier
    const btnKeywords = ['やめる', 'もどる', 'メニューにもどる', 'リストにもどる', 'レベルせんたくに もどる'];
    const buttons = document.querySelectorAll('button, a, .btn-back, .tc-button, .sc-button, .dv-button-secondary, .level-back-btn, .home-btn-large, .home-btn-text, .nav-btn');
    
    for (let btn of buttons) {
        if (btn.classList.contains('smart-nav-btn')) continue;
        
        // Exclude buttons that explicitly link to home or contain "ホーム"
        const text = btn.textContent.trim();
        const href = btn.getAttribute('href');
        if (text.includes('ホーム') || href === 'index.html') continue;
        
        // Check if visible
        const style = window.getComputedStyle(btn);
        if (style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') continue;
        
        // Check if it's inside a hidden container
        let parent = btn.parentElement;
        let isHidden = false;
        while (parent && parent !== document.body) {
            const pStyle = window.getComputedStyle(parent);
            if (pStyle.display === 'none' || pStyle.visibility === 'hidden') {
                isHidden = true;
                break;
            }
            parent = parent.parentElement;
        }
        if (isHidden) continue;

        // Check if it matches keywords or is an obvious back button
        if (btnKeywords.some(kw => text.includes(kw)) || btn.classList.contains('btn-back') || btn.classList.contains('level-back-btn')) {
            btn.click();
            return;
        }
    }

    // Fallback: Return to Category List (Tier 2)
    window.location.href = "index.html?cat=kanji_game";
};
</script>


<script>
// Antigravity Session Cleanup
window.addEventListener('antigravity-session-end', function() {
    if (typeof window.performNavCleanup === 'function') {
        window.performNavCleanup();
    }
});
</script>

<script>
// Antigravity Session Cleanup
window.addEventListener('antigravity-session-end', function() {
    if (typeof window.performNavCleanup === 'function') {
        window.performNavCleanup();
    }
});
</script>
</body>


</html>
